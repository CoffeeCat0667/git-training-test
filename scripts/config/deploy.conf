# scripts/config/deploy.conf
# vision-toolkit 部署配置
# 所有脚本都 source 这个文件来获取运行时参数
# shellcheck disable=SC2034

# ---- 项目信息 ----
PROJECT_NAME="vision-toolkit"
COMPOSE_PROJECT_NAME="vision-toolkit"

# ---- 镜像 ----
IMAGE_NAME="ghcr.io/coffeecat0667/vision-toolkit"
IMAGE_TAG="${IMAGE_TAG:-latest}"

# ---- 服务 ----
SERVICE_PORT=8000
HEALTHCHECK_URL="http://localhost:${SERVICE_PORT}/health"
HEALTHCHECK_TIMEOUT=60

# ---- 路径 ----
PROJECT_ROOT="$(cd "$(dirname "${BASH_SOURCE[0]}")/../.." && pwd)"
LOG_DIR="${PROJECT_ROOT}/logs/deploy"
BACKUP_DIR="${PROJECT_ROOT}/.deploy-backup"

# ---- 前置约束 ----
MIN_DISK_GB=5
REQUIRED_DOCKER_VERSION="24.0"

# ---- 远程部署 ----
REMOTE_APP_DIR="/opt/vision-toolkit"
REMOTE_SSH_OPTS="-o ConnectTimeout=10 -o StrictHostKeyChecking=accept-new"
REMOTE_RSYNC_EXCLUDES=(
    ".git"
    "__pycache__"
    "*.pyc"
    ".pytest_cache"
    "*.egg-info"
    ".deploy-backup"
    "logs/"
    "output/"
    ".venv"
    "venv"
)
